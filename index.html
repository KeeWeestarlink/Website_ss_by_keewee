    Author: https://t.me/html_codee 
    Project: Website Screenshot Tool via Microlink API
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Screenshot Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-area {
            min-height: 450px;
            background-color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #e5e7eb;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #screenshotImg {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-16">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tight text-slate-900 mb-4">Screenshot API</h1>
            <p class="text-lg text-slate-600">Capture any website instantly using Microlink's powerful engine.</p>
        </div>

        <div class="bg-white shadow-2xl rounded-3xl p-8 border border-slate-100">
            <!-- Form Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="lg:col-span-2 space-y-2">
                    <label class="text-sm font-bold uppercase tracking-wider text-slate-500">Target Website URL</label>
                    <input type="url" id="targetUrl" placeholder="https://example.com" 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-bold uppercase tracking-wider text-slate-500">Device Preset</label>
                    <select id="deviceType" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none appearance-none cursor-pointer">
                        <option value="width=1920&height=1080">Desktop (1920x1080)</option>
                        <option value="width=1440&height=900">Laptop (1440x900)</option>
                        <option value="width=768&height=1024">Tablet (768x1024)</option>
                        <option value="width=375&height=812">Smartphone (iPhone X)</option>
                    </select>
                </div>
            </div>

            <!-- Options & Action -->
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-10">
                <div class="flex gap-8">
                    <label class="inline-flex items-center cursor-pointer group">
                        <input type="checkbox" id="fullPageOpt" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-slate-700 font-medium group-hover:text-blue-600 transition">Full Page</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer group">
                        <input type="checkbox" id="darkModeOpt" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-slate-700 font-medium group-hover:text-blue-600 transition">Dark Mode</span>
                    </label>
                </div>

                <button id="btnCapture" class="w-full md:w-auto px-10 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-95">
                    Generate Screenshot
                </button>
            </div>

            <!-- Output Display -->
            <div class="preview-area" id="outputWrapper">
                <div class="spinner" id="loadingSpinner"></div>
                <div id="emptyState" class="text-center p-10">
                    <svg class="w-16 h-16 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-slate-400 font-medium">Your screenshot will appear here</p>
                </div>
                <img id="screenshotImg" class="hidden" alt="Website Screenshot">
            </div>

            <!-- Secondary Actions -->
            <div id="footerActions" class="hidden mt-6 text-center">
                <button id="btnOpenFull" class="text-blue-600 hover:text-blue-800 font-semibold text-sm underline underline-offset-4">
                    Open image in new tab
                </button>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-slate-400 text-sm">
            Created by <a href="https://t.me/KeeWee_starlink" class="hover:text-blue-500 underline">KeeWee</a>
        </footer>
    </div>

    <script>
        const btnCapture = document.getElementById('btnCapture');
        const targetUrl = document.getElementById('targetUrl');
        const deviceType = document.getElementById('deviceType');
        const fullPageOpt = document.getElementById('fullPageOpt');
        const darkModeOpt = document.getElementById('darkModeOpt');
        const screenshotImg = document.getElementById('screenshotImg');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const emptyState = document.getElementById('emptyState');
        const footerActions = document.getElementById('footerActions');
        const btnOpenFull = document.getElementById('btnOpenFull');

        btnCapture.addEventListener('click', () => {
            const url = targetUrl.value.trim();
            if (!url) {
                alert("Please enter a valid URL!");
                return;
            }

            // Reset UI
            loadingSpinner.style.display = 'block';
            screenshotImg.classList.add('hidden');
            emptyState.classList.add('hidden');
            footerActions.classList.add('hidden');
            btnCapture.disabled = true;
            btnCapture.innerText = "Processing...";

            // Build API Request
            const deviceConfig = deviceType.value;
            const fullPage = fullPageOpt.checked ? '&fullPage=true' : '';
            const darkMode = darkModeOpt.checked ? '&colorScheme=dark' : '';
            
            // Microlink API Endpoint
            const apiUrl = `https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true&${deviceConfig}${fullPage}${darkMode}&embed=screenshot.url`;

            // Set source and wait for load
            screenshotImg.src = apiUrl;

            screenshotImg.onload = () => {
                loadingSpinner.style.display = 'none';
                screenshotImg.classList.remove('hidden');
                footerActions.classList.remove('hidden');
                btnCapture.disabled = false;
                btnCapture.innerText = "Generate Screenshot";
            };

            screenshotImg.onerror = () => {
                alert("Failed to fetch screenshot. Please check the URL.");
                loadingSpinner.style.display = 'none';
                emptyState.classList.remove('hidden');
                btnCapture.disabled = false;
                btnCapture.innerText = "Generate Screenshot";
            };
        });

        btnOpenFull.addEventListener('click', () => {
            window.open(screenshotImg.src, '_blank');
        });
    </script>
</body>
</html>
